<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpHub AI - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f6f3eb; /* Creamy background */
    color: #1a1a1a;
    padding: 20px;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto 30px;
    padding: 10px 0;
    position: relative;
    top: 0;
}

.logo {
    display: flex;
    align-items: center;
    font-weight: 700;
    gap: 10px;
}

.logo-icon {
    background: #00897b;
    color: white;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

nav a {
    text-decoration: none;
    color: #666;
    margin-left: 20px;
    font-size: 14px;
}

nav a.active {
    background: #e0e7e1;
    padding: 8px 16px;
    border-radius: 20px;
    color: #1a1a1a;
}

/* Main Layout */
.container {
    max-width: 1100px;
    margin: 0 auto;
}

/* Top Banner */
.banner-card {
    background: #22282a;
    color: white;
    padding: 40px;
    border-radius: 30px;
    margin-bottom: 30px;
}

.banner-card h1 {
    font-size: 48px;
    margin: 5px 0;
}

.label {
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.7;
}

/* Grid System */
.profile-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 25px;
}

.card {
    background: white;
    padding: 35px;
    border-radius: 30px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
}

.label-green {
    color: #00897b;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 15px;
}

h2 {
    font-size: 32px;
    margin-bottom: 25px;
}

/* Public Profile Details */
.stats-row {
    display: flex;
    justify-content: space-between;
    padding: 15px 0;
    font-size: 15px;
}

hr {
    border: 0;
    border-top: 1px solid #eee;
}

.tags-section {
    margin-top: 25px;
}

.tag-label {
    font-weight: 600;
    margin-bottom: 12px;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.tag-pill {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
}

.skill { background: #e8f5f3; color: #00695c; }
.badge { background: #e0e7e1; color: #1a1a1a; }

/* Form Elements */
.form-row {
    display: flex;
    gap: 15px;
}

.input-group {
    margin-bottom: 20px;
    flex: 1;
}

.input-group label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
}

input {
    width: 100%;
    padding: 14px;
    border: 1px solid #f0f0f0;
    background: #fcfcfc;
    border-radius: 12px;
    font-size: 14px;
}

.save-btn {
    width: 100%;
    background: #00897b;
    color: white;
    border: none;
    padding: 16px;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s;
}

.save-btn:hover {
    background: #00695c;
}

 /* =========================
   TABLET (max 1024px)
========================= */
@media (max-width: 1024px) {

    .profile-grid {
        grid-template-columns: 1fr;
    }

    .banner-card h1 {
        font-size: 38px;
    }
}


/* =========================
   MOBILE (max 768px)
========================= */
@media (max-width: 768px) {

    body {
        padding: 12px;
    }

    /* Navbar */
    .navbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    nav a {
        margin-left: 10px;
        font-size: 13px;
    }

    /* Banner */
    .banner-card {
        padding: 25px;
        border-radius: 20px;
    }

    .banner-card h1 {
        font-size: 26px;
        line-height: 1.2;
    }

    /* GRID */
    .profile-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }

    .card {
        padding: 20px;
        border-radius: 20px;
    }

    h2 {
        font-size: 22px;
    }

    /* STATS */
    .stats-row {
        flex-direction: column;
        gap: 10px;
    }

    /* FORM */
    .form-row {
        flex-direction: column;
    }

    .input-group {
        width: 100%;
    }

    input {
        padding: 12px;
    }

    .save-btn {
        padding: 14px;
    }

    /* TAGS */
    .tags {
        gap: 6px;
    }

    .tag-pill {
        font-size: 12px;
        padding: 6px 12px;
    }
}
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">H</span> HelpHub AI
        </div>
        <nav>
            <a href="./home2.html">Dashboard</a>
            <a href="#">Onboarding</a>
            <a href="#" class="active">Profile</a>
        </nav>
    </header>

    <main class="container">
        <section class="banner-card">
            <p class="label">PROFILE</p>
            <h1>Hafiz Sanaullah Maniar</h1>
            <p class="subtext">Both • Karachi</p>
        </section>

        <div class="profile-grid">
            <section class="card">
                <p class="label-green">PUBLIC PROFILE</p>
                <h2>Skills and reputation</h2>
                
                <div class="stats-row">
                    <span>Trust score</span>
                    <strong>100%</strong>
                </div>
                <hr>
                <div class="stats-row">
                    <span>Contributions</span>
                    <strong>35</strong>
                </div>

                <div class="tags-section">
                    <p class="tag-label">Skills</p>
                    <div class="tags">
                        <span class="tag-pill skill">Figma</span>
                        <span class="tag-pill skill">UI/UX</span>
                        <span class="tag-pill skill">HTML/CSS</span>
                        <span class="tag-pill skill">Career Guidance</span>
                    </div>
                </div>

                <div class="tags-section">
                    <p class="tag-label">Badges</p>
                    <div class="tags">
                        <span class="tag-pill badge">Design Ally</span>
                        <span class="tag-pill badge">Fast Responder</span>
                        <span class="tag-pill badge">Top Mentor</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <p class="label-green">EDIT PROFILE</p>
                <h2>Update your identity</h2>
                
                <form>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Name</label>
                            <input type="text" value="Ayesha Khan">
                        </div>
                        <div class="input-group">
                            <label>Location</label>
                            <input type="text" value="Karachi">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Skills</label>
                        <input type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance">
                    </div>

                    <div class="input-group">
                        <label>Interests</label>
                        <input type="text" value="Hackathons, UI/UX, Community Building">
                    </div>

                    <button type="submit" class="save-btn">Save profile</button>
                </form>
            </section>
        </div>
    </main>

</body>
